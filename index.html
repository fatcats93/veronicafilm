<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .container {
      margin-top: 20px;
      text-align: center;
      position: relative;
      padding-bottom: 200px;
    }

    .header-text {
      font-size: 180px;
      font-weight: bold;
      color: #fff;
      margin: 0;
      text-align: center;
      line-height: 1;
    }

    .subheader-text {
      font-size: 140px;
      font-weight: bold;
      color: #fff;
      margin: 0;
      text-align: center;
      line-height: 1;
      margin-bottom: 50px;
    }

    .title-image {
      display: none;
    }

    .poster-row {
      display: grid;
      grid-template-columns: auto auto auto;
      justify-content: center;
      column-gap: 80px;
      margin-top: 0px;
      position: relative;
      z-index: 5;
    }

    .poster {
      max-width: 470px;
      width: 100%;
      height: auto;
      border-radius: 14px;
      box-shadow: 0px 8px 30px rgba(0,0,0,0.45);
      cursor: pointer;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: auto auto auto;
      justify-content: center;
      column-gap: 80px;
      margin-top: 60px;
    }

    @media (max-width: 700px) {
      .header-text {
        font-size: 100px;
      }
      .subheader-text {
        font-size: 80px;
        margin-bottom: 30px;
      }
      .poster-row, .bottom-row {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .poster {
        max-width: 90%;
      }
      .bottom-row {
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="header-text">FATCATS</h1>
    <h2 class="subheader-text">STUDIOS</h2>

    <!-- Top Row -->
    <div class="poster-row">
      <a href="https://www.youtube.com/watch?v=mg8MOKGUxH4" target="_blank">
        <img src="superzeros.jpeg" alt="Superzeros" class="poster">
      </a>

      <a href="https://youtu.be/9GQ9nFCIjoY" target="_blank">
        <img src="maxdollar.jpeg" alt="Max Dollar Poster" class="poster">
      </a>

      <a href="https://youtu.be/w7c8KUtqwJg" target="_blank">
        <img src="sixposter.jpeg" alt="Six Poster" class="poster">
      </a>
    </div>

    <!-- Bottom Row -->
    <div class="bottom-row">
      <a href="https://youtu.be/TuGxdEprqZ8" target="_blank">
        <img src="pharmaka.jpeg" alt="Pharmaka Poster" class="poster">
      </a>

      <a href="https://www.youtube.com/watch?v=oqQwZhliKR4" target="_blank">
        <img src="Rosina.jpg" alt="Rosina Poster" class="poster">
      </a>

      <a href="#" target="_blank">
        <img src="quaranteam.jpg" alt="Quaranteam Poster" class="poster">
      </a>
    </div>

  </div>

</body>
</html>
